apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-crashloop
  namespace: default
  labels:
    app: demo-crashloop
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: demo-crashloop
  template:
    metadata:
      labels:
        app: demo-crashloop
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              if [ -f /state/last_pod ] && [ "$(cat /state/last_pod)" != "$HOSTNAME" ]; then
                echo recovered after pod replacement
                sleep 3600
              fi
              echo "$HOSTNAME" > /state/last_pod
              echo crash
              sleep 2
              exit 1
          volumeMounts:
            - name: crashloop-state
              mountPath: /state
      volumes:
        - name: crashloop-state
          hostPath:
            path: /tmp/k8s-whisperer-demo-crashloop
            type: DirectoryOrCreate
