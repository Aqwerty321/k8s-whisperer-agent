apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-crashloop
  namespace: default
  labels:
    app: demo-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-crashloop
  template:
    metadata:
      labels:
        app: demo-crashloop
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["/bin/sh", "-c", "echo crash && sleep 2 && exit 1"]
