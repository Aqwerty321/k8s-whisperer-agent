apiVersion: v1
kind: Pod
metadata:
  name: demo-oomkill
  namespace: default
  labels:
    app: demo-oomkill
spec:
  restartPolicy: Always
  containers:
    - name: memory-hog
      image: python:3.11-alpine
      command:
        - python
        - -c
        - |
          chunks = []
          while True:
              chunks.append('x' * 1024 * 1024)
      resources:
        limits:
          memory: "64Mi"
        requests:
          memory: "32Mi"
