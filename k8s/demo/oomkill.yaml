apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-oomkill
  namespace: default
  labels:
    app: demo-oomkill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-oomkill
  template:
    metadata:
      labels:
        app: demo-oomkill
    spec:
      containers:
        - name: memory-hog
          image: python:3.11-alpine
          command:
            - python
            - -c
            - |
              import time

              data = bytearray(72 * 1024 * 1024)
              print(f"allocated {len(data)} bytes", flush=True)
              time.sleep(3600)
          resources:
            limits:
              memory: "64Mi"
            requests:
              memory: "32Mi"
