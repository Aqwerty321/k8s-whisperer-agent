apiVersion: v1
kind: Service
metadata:
  name: k8s-whisperer
  namespace: default
spec:
  selector:
    app: k8s-whisperer
  ports:
    - name: http
      port: 8010
      targetPort: 8010
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-whisperer-runtime
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-whisperer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-whisperer
  template:
    metadata:
      labels:
        app: k8s-whisperer
    spec:
      serviceAccountName: k8s-whisperer-sa
      containers:
        - name: api
          image: k8s-whisperer:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8010
          env:
            - name: APP_ENV
              value: dev
            - name: PORT
              value: "8010"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OBSERVE_ALL_NAMESPACES
              value: "false"
            - name: OBSERVED_NAMESPACES
              value: ""
            - name: PUBLIC_BASE_URL
              value: https://slack.aqwerty321.me
            - name: SLACK_DEFAULT_CHANNEL
              value: "C0AP2V8M939"
            - name: ENABLE_BACKGROUND_POLLING
              value: "false"
            - name: AUDIT_LOG_PATH
              value: /app/runtime/audit/audit.jsonl
            - name: CHECKPOINT_STORE_PATH
              value: /app/runtime/data/langgraph-checkpoints.pkl
            - name: ALLOW_WORKLOAD_PATCHES
              value: "false"
            - name: ENABLE_NODE_READ_OBSERVATION
              value: "false"
            - name: STELLAR_NETWORK
              value: testnet
            - name: STELLAR_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: k8s-whisperer-secrets
                  key: stellar_rpc_url
                  optional: true
            - name: STELLAR_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-whisperer-secrets
                  key: stellar_secret_key
                  optional: true
            - name: STELLAR_CONTRACT_ID
              valueFrom:
                secretKeyRef:
                  name: k8s-whisperer-secrets
                  key: stellar_contract_id
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8s-whisperer-secrets
                  key: slack_bot_token
                  optional: true
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: k8s-whisperer-secrets
                  key: slack_signing_secret
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-whisperer-secrets
                  key: gemini_api_key
                  optional: true
          volumeMounts:
            - name: runtime
              mountPath: /app/runtime
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: runtime
          persistentVolumeClaim:
            claimName: k8s-whisperer-runtime
